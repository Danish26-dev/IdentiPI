<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idina | Voice Identity Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Background Ambient Blobs -->
        <div class="blob-cont">
            <div class="yellow blob"></div>
            <div class="red blob"></div>
            <div class="green blob"></div>
        </div>

        <header>
            <div class="logo">Idina</div>
            <div class="status-indicator">
                <span class="dot" id="status-dot"></span>
                <span class="status-text" id="status-text">System Online</span>
            </div>
        </header>

        <main>
            <div class="assistant-ui">
                <div class="orb-container" id="mic-btn">
                    <div class="orb"></div>
                    <div class="pulse-ring"></div>
                    <!-- Microphone SVG Icon -->
                    <svg class="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </div>
                
                <div class="interaction-state" id="interaction-state">
                    Tap to speak
                </div>
            </div>

            <!-- Dashboard to display intents and STT text -->
            <div class="dashboard unmounted" id="dashboard">
                <div class="dashboard-header">Last Interacted Command</div>
                <div class="action-card">
                    <div class="action-row">
                        <span class="label">Transcribed Speech:</span>
                        <span class="value transcript-value" id="transcript-val">-</span>
                    </div>
                    <hr style="border-color: rgba(255,255,255,0.05); margin: 0.5rem 0;">
                    <div class="action-row">
                        <span class="label">Intent Detected:</span>
                        <span class="value intent-value" id="intent-val">-</span>
                    </div>
                    <div class="action-row">
                        <span class="label">AI Action Response:</span>
                        <span class="value ai-value" id="ai-response-val">-</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden audio element for TTS playback -->
    <audio id="tts-audio" style="display: none;"></audio>

    <script src="/static/script.js"></script>
</body>
</html>
